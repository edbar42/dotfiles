# : Manager {{{

[mgr]
cwd = { fg = "#61afef" } # blue

# Hovered
hovered = { fg = "#abb2bf", bg = "#2c323c" }
preview_hovered = { underline = true }

# Find
find_keyword = { fg = "#e5c07b", italic = true } # yellow
find_position = { fg = "#e06c75", bg = "reset", italic = true } # red

# Marker
marker_selected = { fg = "#61afef", bg = "#61afef" } # blue
marker_copied = { fg = "#e5c07b", bg = "#e5c07b" } # yellow
marker_cut = { fg = "#e06c75", bg = "#e06c75" } # red

# Tab
tab_active = { fg = "#abb2bf", bg = "#2c323c" }
tab_inactive = { fg = "#5c6370", bg = "#21252b" }
tab_width = 1

# Border
border_symbol = "│"
border_style = { fg = "#3e4452" }

# Highlighting
syntect_theme = "~/.config/yazi/onedark.tmTheme"

# : }}}


# : Status {{{

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#2c323c", bg = "#2c323c" }

# Mode
mode_normal = { fg = "#282c34", bg = "#98c379", bold = true } # green
mode_select = { fg = "#282c34", bg = "#61afef", bold = true } # blue
mode_unset = { fg = "#282c34", bg = "#e06c75", bold = true } # red

# Progress
progress_label = { fg = "#abb2bf", bold = true }
progress_normal = { fg = "#98c379", bg = "#2c323c" } # green
progress_error = { fg = "#e06c75", bg = "#2c323c" } # red

# Permissions
permissions_t = { fg = "#c678dd" } # magenta
permissions_r = { fg = "#98c379" } # green
permissions_w = { fg = "#d19a66" } # orange
permissions_x = { fg = "#61afef" } # blue
permissions_s = { fg = "#5c6370" }

# : }}}


# : Input {{{

[input]
border = { fg = "#3e4452" }
title = {}
value = {}
selected = { reversed = true }

# : }}}


# : Select {{{

[select]
border = { fg = "#3e4452" }
active = { fg = "#c678dd" } # magenta
inactive = {}

# : }}}


# : Tasks {{{

[tasks]
border = { fg = "#3e4452" }
title = {}
hovered = { underline = true }

# : }}}


# : Which {{{

[which]
mask = { bg = "#2c323c" }
cand = { fg = "#61afef" } # blue
rest = { fg = "#5c6370" }
desc = { fg = "#c678dd" } # magenta
separator = "  "
separator_style = { fg = "#5c6370" }

# : }}}


# : Help {{{

[help]
on = { fg = "#c678dd" } # magenta
exec = { fg = "#61afef" } # blue
desc = { fg = "#5c6370" }
hovered = { bg = "#2c323c", bold = true }
footer = { fg = "#282c34", bg = "#abb2bf" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#56b6c2" }, # cyan

    # Videos & Audio
    { mime = "video/*", fg = "#e5c07b" }, # yellow
    { mime = "audio/*", fg = "#e5c07b" }, # yellow

    # Archives
    { mime = "application/zip", fg = "#e06c75" }, # red
    { mime = "application/gzip", fg = "#e06c75" }, # red
    { mime = "application/x-tar", fg = "#e06c75" }, # red
    { mime = "application/x-bzip", fg = "#e06c75" }, # red
    { mime = "application/x-bzip2", fg = "#e06c75" }, # red
    { mime = "application/x-7z-compressed", fg = "#e06c75" }, # red
    { mime = "application/x-rar", fg = "#e06c75" }, # red

    # Fallback
    { name = "*", fg = "#abb2bf" },
    { name = "*/", fg = "#61afef" }, # blue for directories
]

# : }}}
